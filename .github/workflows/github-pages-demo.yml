# Static UI demo on GitHub Pages (in-browser data only; no FastAPI/Postgres).
# Pushes the Next export to branch `gh-pages`.
#
# Settings → Pages → Build and deployment:
#   Source = "Deploy from a branch"
#   Branch = gh-pages, folder = / (root)
#   (Do not use "GitHub Actions" as the Pages source for this workflow.)
name: Deploy Pages demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-mdchat-demo
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build static demo
        env:
          MDCHAT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_MDCHAT_DEMO: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build:demo

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          force_orphan: true
