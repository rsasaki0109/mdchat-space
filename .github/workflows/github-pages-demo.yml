# Static UI demo on GitHub Pages (in-browser data only; no FastAPI/Postgres).
# Prerequisite: repo Settings → Pages → Source = GitHub Actions (otherwise deploy job 404s).
name: Deploy Pages demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages-mdchat-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build static demo
        env:
          MDCHAT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_MDCHAT_DEMO: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build:demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
