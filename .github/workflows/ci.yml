# CI: web build, API pytest (SQLite), Playwright E2E (Postgres + live API).
# Python venv lives at repo root `.venv/` (same idea as `npm run test:api`).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build:web

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create venv and install API dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/pip install -r apps/api/requirements.txt -r apps/api/requirements-dev.txt
      - name: Run API tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          # From repo root, `app` resolves like `cd apps/api && pytest tests` when cwd is on PYTHONPATH.
          PYTHONPATH: ${{ github.workspace }}/apps/api
        run: .venv/bin/python -m pytest apps/api/tests -q

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mdchat
          POSTGRES_PASSWORD: mdchat
          POSTGRES_DB: mdchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mdchat -d mdchat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install API runtime deps
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/pip install -r apps/api/requirements.txt

      - name: Write .env for API
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql+psycopg://mdchat:mdchat@127.0.0.1:5432/mdchat
          DATA_DIR=./data/channels
          CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3030,http://127.0.0.1:3030
          SEED_DEMO_DATA=true
          EOF

      - name: Prepare data directory
        run: mkdir -p data/channels

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Uvicorn must stay alive for Playwright; one shell keeps both.
      - name: Start API and run Playwright E2E
        env:
          MDCHAT_API_URL: http://127.0.0.1:8000
        run: |
          nohup .venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --app-dir apps/api > /tmp/uvicorn.log 2>&1 &
          API_PID=$!
          cleanup() { kill "$API_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
              echo "API ready"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "API failed to start:"
              cat /tmp/uvicorn.log
              exit 1
            fi
            sleep 1
          done
          npm run test:e2e

      - name: Upload uvicorn log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: /tmp/uvicorn.log
