services:
  postgres:
    image: postgres:16-alpine
    container_name: mdchat-space-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mdchat
      POSTGRES_USER: mdchat
      POSTGRES_PASSWORD: mdchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
