services:
  postgres:
    image: postgres:16-alpine
    container_name: mdchat-space-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mdchat
      POSTGRES_USER: mdchat
      POSTGRES_PASSWORD: mdchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdchat -d mdchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://mdchat:mdchat@postgres:5432/mdchat
      DATA_DIR: /repo/data/channels
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SEED_DEMO_DATA: "true"
      # MDCHAT_API_WRITE_KEY: change-me
      # AI_BACKEND: heuristic
    volumes:
      - channel_data:/repo/data/channels
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  channel_data:
